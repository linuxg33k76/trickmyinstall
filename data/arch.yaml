#YAML

Update:
    - sudo pacman -Syyu

Packages: 
    - sudo pacman -S sysfsutils
    - sudo pacman -S stow
    - sudo pacman -S fprintd
    - sudo pacman -S solaar
    - sudo pacman -S deja-dup
    - sudo pacman -S rsync
    - sudo pacman -S yazi
    - yay -S google-chrome
    - yay -S antigravity
    - yay -S expressvpn
    - yay -S standardnotes-bin

Backup:
    - echo "Backing up files for modification during Omarchy setup."
    - sudo cp /etc/fstab /etc/fstab.bak.$(date '+%m-%d-%Y-%H_%M_%S')
    - sudo cp /etc/pam.d/sudo /etc/pam.d/sudo.bak.$(date '+%m-%d-%Y-%H_%M_%S')

VimSetup:
    - echo "No Vim Setup"
    
Environment:
    - echo "Environment setup for Omarchy Linux"
    - cd /home/${USER} && test -d .dotfiles || git clone https://github.com/linuxg33k76/.dotfiles.git
    - cd /home/${USER}/.dotfiles && stow expressvpn
    - echo "Enabling expressvpn-service.service"
    - sudo systemctl enable expressvpn-service.service
    - echo "Starting expressvpn-service.service"
    - sudo systemctl start expressvpn-service.service
    - echo "Copying ExpressVPN config files & authorizing"
    - expressvpnctl login /home/${USER}/.expressvpn
    - echo "Installing Stowed config files..."
    - cd /home/${USER}/.dotfiles && stow hypr
    - cd /home/${USER}/.dotfiles && stow waybar
    - cd /home/${USER}/.dotfiles && stow bashrc
    - cd /home/${USER}/.dotfiles && stow vimrc
    - echo "Installation of Stowed config files...complete!"
    - cd /home/${USER}/code && test -d bash_scripts || git clone https://github.com/linuxg33k76/bash_scripts.git
   