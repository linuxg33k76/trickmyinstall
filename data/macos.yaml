#YAML

Update:
    - softwareupdate -lai

Packages:
    - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    - brew install fastfetch
    - brew install python3
    - brew install oh-my-posh
    - brew install stow
    - brew install ghostty
    - brew install git
    - brew install tldr
    - brew install fd
    - brew install bat
    - brew install fzf
    - brew install htop
    - brew install neovim
    - brew install ripgrep
    - brew install coreutils
    - brew install watch
    - brew install font-jetbrains-mono-nerd-font
    - brew install yazi
    
Backup:
    - echo "Backing up brew install list..."
    - > 
        if [ ! -d /Users/${USER}/backup ]; then
            mkdir /Users/${USER}/backup
        else
            pass
        fi
    - brew list > /Users/${USER}/backup/brew_installed_packages_$(date "+%d-%m-%Y-%H:%M")

VimSetup:
    - echo "Setting up Neovim configuration for macOS."
   

Environment:
    - echo "Setting up environment variables for macOS."
    - echo "Checking for existing .dotfiles directory."
    - > 
        if [ ! -d "/Users/${USER}/.dotfiles" ]; then
            echo "You need to install .dotfiles first!"
            echo " syntax:  git clone git@github.com/linuxg33k76/.dotfiles.git /Users/${USER}/.dotfiles"
        else
            echo ".dotfiles directory already exists."
            cd /Users/${USER}/.dotfiles && stow nvim
            cd /Users/${USER}/.dotfiles && stow ghostty
            cd /Users/${USER}/.dotfiles && stow zshrc
            cd /Users/${USER}/.dotfiles && stow zprofile
        fi