#YAML

Update:
    - softwareupdate -lai

Packages:
    - /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    - brew install fastfetch
    - brew install python3
    - brew install oh-my-posh
    - brew install git
    - brew install tldr
    - brew install fd
    - brew install bat
    - brew install fzf
    - brew install htop
    - brew install neovim
    - brew install ripgrep
    - brew install coreutils
    - brew install watch
    
    

Backup:
    - echo "Backing up files for modification during macOS setup."
    - cp /Users/${USER}/.zprofile /Users/${USER}/zprofile.bak.$(date '+%m-%d-%Y-%H_%M_%S')
    - cp /Users/${USER}/.zshrc /Users/${USER}/zshrc.bak.$(date '+%m-%d-%Y-%H_%M_%S')

VimSetup:
    - echo "set number" > /Users/${USER}/.vimrc
    - echo "syntax on" >> /Users/${USER}/.vimrc
    - echo "colorscheme ron" >> /Users/${USER}/.vimrc

Environment:
    - cp /Users/${USER}/code/trickmyinstall/data/mac_data/zshrc.example /Users/${USER}/.zshrc
    - cp /Users/${USER}/code/trickmyinstall/data/mac_data/zprofile.example /Users/${USER}/.zprofile