#YAML

Update:
    - sudo paru -Syyu

Packages: 
    - sudo paru -S sysfsutils
    - sudo paru -S fprintd
    - sudo paru -S cachyos-gaming-meta
    - sudo paru -S cachyos-gaming-applications
    - paru -S google-chrome
    - paru -S antigravity
    - paru -S 1password
    - paru -S solaar
    - sudo paru -S deja-dup
    - sudo paru -S pamac-aur
    - sudo paru -S discover

Backup:
    - echo "Backing up files for modification during CachyOS setup."
    - sudo cp /etc/fstab /etc/fstab.bak.$(date '+%m-%d-%Y-%H_%M_%S')
    - sudo cp /etc/pam.d/sudo /etc/pam.d/sudo.bak.$(date '+%m-%d-%Y-%H_%M_%S')

VimSetup:
    - echo "Skipping Vim Setup"
    
Environment:
    - echo "Environment setup for CachyOS"
    - cd /home/${USER} && test -d .dotfiles || git clone https://github.com/linuxg33k76/.dotfiles.git
    - echo "Installing Stowed config files..."
    - cd /home/${USER}/.dotfiles && stow fish
    - cd /home/${USER}/.dotfiles && stow nvims
    - echo "Config File installation is complete!" 