#YAML

Update:
    - sudo paru -Syyu

Packages: 
    - sudo paru -S sysfsutils
    - sudo paru -S fprintd
    - sudo paru -S cachyos-gaming-meta
    - sudo paru -S cachyos-gaming-applications
    - paru -S google-chrome
    - paru -S antigravity
    - paru -S 1password
    - paru -S solaar
    - paru -S stow
    - sudo paru -S deja-dup
    - sudo paru -S pamac-aur
    - sudo paru -S discover

Backup:
    - echo "Backing up files for modification during CachyOS setup."
    - sudo cp /etc/fstab /etc/fstab.bak.$(date '+%m-%d-%Y-%H_%M_%S')
    - sudo cp /etc/pam.d/sudo /etc/pam.d/sudo.bak.$(date '+%m-%d-%Y-%H_%M_%S')

VimSetup:
    - echo "Skipping Vim Setup"
    
Environment:
    - echo "Environment setup for CachyOS"
    - echo "Setting fish shell prompt to Astronaut theme"
    - /usr/bin/fish -c "fish_config prompt choose astronaut && funcsave fish_prompt"
    - cd /home/${USER}/code && test -d bash_scripts || git clone https://github.com/linuxg33k76/bash_scripts
    - cp /home/${USER}/code/trickmyinstall/data/cachyos_data/config.fish /home/${USER}/.config/fish/config.fish
    - sudo cp /home/${USER}/code/trickmyinstall/data/cachyos_data/sudo /etc/pam.d/sudo
    # - /usr/bin/fish -c "/home/${USER}/code/trickmyinstall/data/cachyos_data/hyprland_install.fish"